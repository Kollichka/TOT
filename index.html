<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOT | Команда дубляжа</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase SDK -->
    <script type="module">
        // Импортируйте Firebase SDK (версия 9+)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, child, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Ваша конфигурация Firebase (скопируйте из консоли)
        const firebaseConfig = {
            apiKey: "ВАШ_API_KEY",
            authDomain: "ВАШ_AUTH_DOMAIN",
            databaseURL: "ВАШ_DATABASE_URL",
            projectId: "ВАШ_PROJECT_ID",
            storageBucket: "ВАШ_STORAGE_BUCKET",
            messagingSenderId: "ВАШ_SENDER_ID",
            appId: "ВАШ_APP_ID"
        };

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Сохраняем объект db в глобальную переменную, чтобы использовать в script.js
        window.db = db;
        window.ref = ref;
        window.set = set;
        window.get = get;
        window.child = child;
        window.update = update;
        window.remove = remove;
    </script>
    <script type="module" src="script.js"></script>
</head>
<body>
    ... (остальной HTML такой же, как в предыдущей версии)
</body>
</html>
